---
# Scale AI Agent backend workers based on Prometheus pending task queue
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-agent-worker-scaler
  namespace: default
  labels:
    app: ai-agent-worker
    managed-by: k8s-ai-agent
spec:
  scaleTargetRef:
    name: ai-agent-worker
  minReplicaCount: 0        # scale to zero when no tasks pending
  maxReplicaCount: 20
  cooldownPeriod: 60        # seconds to wait before scaling down
  pollingInterval: 15       # how often to check the metric
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.monitoring.svc.cluster.local:9090
        metricName: pending_k8s_agent_tasks
        threshold: "5"      # 1 extra replica per 5 pending tasks
        query: sum(k8s_ai_agent_pending_tasks)

---
# Scale based on Redis task queue depth
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-agent-redis-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: ai-agent-worker
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 30
  triggers:
    - type: redis
      metadata:
        address: redis-service.default.svc.cluster.local:6379
        listName: k8s_agent_task_queue
        listLength: "5"

---
# Business-hours scaling: always have minimum replicas 9am-6pm weekdays
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-agent-cron-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: ai-agent-worker
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
    - type: cron
      metadata:
        timezone: Asia/Kolkata
        start: "0 9 * * 1-5"     # 9:00 AM Mon-Fri
        end: "0 18 * * 1-5"      # 6:00 PM Mon-Fri
        desiredReplicas: "3"
